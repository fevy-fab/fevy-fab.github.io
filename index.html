<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f9;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; line-height: 1.6; }
        .contact-info {
            margin: 25px 0;
            padding: 15px;
            background-color: #f9f9fb;
            border-radius: 8px;
        }
        .contact-info a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .contact-info a:hover {
            text-decoration: underline;
        }
        .button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Teffany</h1>

        <div class="contact-info">
            <p>📧 <strong>Email:</strong> <br> 
               <a href="mailto:Teffany.zappify.io@gmail.com">Teffany.zappify.io@gmail.com</a>

            <p>📱 <strong>Phone:</strong> <br> 
               <a href="tel:09702741611">09702741611</a>
            </p>
